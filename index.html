<!-- DASHBOARD -->
<div class="dashboard-layout">

    <!-- LINKE SEITE -->
    <div class="dashboard-main">

        <!-- STATS -->
        <div class="stats-grid">

            <div class="stat-card">
                <div class="stat-title">Offene Aufträge</div>
                <div class="stat-value" id="stat_open">0</div>
            </div>

            <div class="stat-card">
                <div class="stat-title">Übernommen</div>
                <div class="stat-value" id="stat_taken">0</div>
            </div>

            <div class="stat-card">
                <div class="stat-title">Erledigt</div>
                <div class="stat-value" id="stat_done">0</div>
            </div>

        </div>

        <!-- OFFENE AUFTRÄGE -->
        <div class="section-card">

            <div class="section-header" onclick="toggleSection('open_jobs_list')">
                <h2>🟢 Offene Aufträge</h2>
                <span>▼</span>
            </div>

            <div id="open_jobs_list"></div>

        </div>

        <!-- MEINE AUFTRÄGE -->
        <div class="section-card">

            <div class="section-header" onclick="toggleSection('my_jobs_list')">
                <h2>🚕 Meine übernommenen Aufträge</h2>
                <span>▼</span>
            </div>

            <div id="my_jobs_list"></div>

        </div>

        <!-- AUFTRAG ERSTELLEN -->
        <div
            class="section-card"
            id="createJobBox"
            style="display:none;"
        >

            <div class="section-header" onclick="toggleSection('create_job_form')">
                <h2>📞 Leitstelle: Auftrag erstellen</h2>
                <span>▼</span>
            </div>

            <div id="create_job_form">

                <div class="form-grid">

                    <div class="field">
                        <label>Fahrtart</label>

                        <select
                            id="job_ride_type"
                            onchange="updateJobForm()"
                        >
                            <option>Normale Fahrt</option>
                            <option>Essenslieferung</option>
                            <option>EMS</option>
                            <option>Bambi-Tour</option>
                            <option>Gebrauchtwagenhändler</option>
                        </select>
                    </div>

                    <div class="field">
                        <label>Abholort</label>
                        <input type="text" id="job_pickup_location">
                    </div>

                    <div class="field">
                        <label>Ziel</label>
                        <input type="text" id="job_destination">
                    </div>

                    <div class="field">
                        <label>Kunde / Spieler / Empfänger</label>
                        <input type="text" id="job_customer_name">
                    </div>

                    <div class="field">
                        <label>Bemerkung</label>
                        <input type="text" id="job_notes">
                    </div>

                    <div
                        class="field"
                        id="companyField"
                        style="display:none;"
                    >
                        <label>Unternehmen</label>

                        <select
                            id="job_company_name"
                            onchange="setPickupFromCompany()"
                        ></select>
                    </div>

                    <div
                        class="field"
                        id="emsField"
                        style="display:none;"
                    >
                        <label>EMS Mitarbeiter</label>
                        <input type="text" id="job_ems_staff_name">
                    </div>

                </div>

                <button onclick="createJob()">
                    Auftrag erstellen
                </button>

            </div>

        </div>

        <!-- ERLEDIGTE -->
        <div class="section-card">

            <div class="section-header" onclick="toggleSection('done_jobs_list')">
                <h2>✅ Erledigte Fahrten</h2>
                <span>▼</span>
            </div>

            <div
                id="done_jobs_list"
                style="display:none;"
            ></div>

        </div>

    </div>

    <!-- SIDEBAR -->
    <div class="dashboard-sidebar">

        <!-- USER -->
        <div class="sidebar-card">

            <div class="sidebar-title">
                👤 Eingeloggt als
            </div>

            <div class="user-box">

                <div>
                    <strong id="currentUserName">-</strong><br>
                    <small id="currentUserRole">-</small>
                </div>

                <div class="user-buttons">

                    <a
                        href="admin.html"
                        id="adminLink"
                        style="display:none;"
                    >
                        <button class="small-btn">
                            Admin
                        </button>
                    </a>

                    <button
                        class="small-btn danger-btn"
                        onclick="logoutUser()"
                    >
                        Logout
                    </button>

                </div>

            </div>

        </div>

        <!-- LEITSTELLE -->
        <div class="sidebar-card">

            <div class="sidebar-title">
                📡 Aktive Leitstelle
            </div>

            <div id="dispatcher_status"></div>

            <button
                id="dispatcherToggleBtn"
                class="small-btn"
                onclick="toggleDispatcherStatus()"
                style="margin-top:15px;"
            >
                Leitstelle übernehmen
            </button>

        </div>

        <!-- FAHRERSTATUS -->
        <div class="sidebar-card">

            <div class="sidebar-title">
                🚕 Fahrerstatus
            </div>

            <div id="driver_status_text">
                Status: Offline
            </div>

            <div
                id="active_drivers_list"
                style="margin-top:12px;"
            ></div>

            <div class="status-buttons">

                <button
                    class="small-btn"
                    onclick="setDriverStatus('Im Dienst')"
                >
                    🟢 Dienst
                </button>

                <button
                    class="small-btn"
                    onclick="setDriverStatus('Pause')"
                >
                    🟡 Pause
                </button>

                <button
                    class="small-btn danger-btn"
                    onclick="setDriverStatus('Offline')"
                >
                    🔴 Offline
                </button>

            </div>

        </div>

        <!-- SOUND -->
        <div class="sidebar-card">

            <div class="sidebar-title">
                🔔 Auftragssound
            </div>

            <div id="sound_status_text">
                Sound: An
            </div>

            <div class="sound-controls">

                <select
                    id="sound_select"
                    onchange="saveSoundSettings()"
                >
                    <option value="bing.mp3">Bing</option>
                    <option value="ruelps.mp3">Rülps</option>
                    <option value="tuturu.mp3">Tuturu</option>
                </select>

                <button
                    class="small-btn"
                    onclick="toggleSound()"
                    id="soundToggleBtn"
                >
                    Sound aus
                </button>

                <button
                    class="small-btn"
                    onclick="testSound()"
                >
                    Test
                </button>

            </div>

        </div>

    </div>

</div>
