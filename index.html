<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Los Santos Taxi Leitstelle</title>

    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="container">

    <div class="header">
        <h1>🚕 Los Santos Taxi</h1>
        <p>Leitstelle & Auftragsverwaltung</p>
    </div>

    <div class="card" id="loginBox">
        <h2>Login</h2>

        <div class="field">
            <label>Benutzername</label>
            <input type="text" id="login_username">
        </div>

        <div class="field">
            <label>Passwort</label>
            <input type="password" id="login_password">
        </div>

        <button type="button" onclick="loginUser()">Einloggen</button>
    </div>

    <div id="appBox" style="display:none;">

        <div class="card userbar">
            <div>
                Eingeloggt als: <strong id="currentUserName"></strong><br>
                Rolle: <span id="currentUserRole"></span>
            </div>

            <button class="small-btn" onclick="logoutUser()">Logout</button>
        </div>

<div class="card" id="dispatcherBox">
    <h2>📡 Leitstellen-Dienst</h2>

    <div id="dispatcher_status"></div>

    <button class="small-btn" onclick="takeDispatcher()">
        Leitstelle übernehmen
    </button>

    <button class="small-btn danger-btn" onclick="leaveDispatcher()">
        Leitstelle abgeben
    </button>
</div>

<div class="card" id="createJobBox">
    <h2>📞 Leitstelle: Auftrag erstellen</h2>

            <div class="form-grid">

                <div class="field">
                    <label>Fahrtart</label>
                    <select id="job_ride_type" onchange="updateJobForm()">
                        <option>Normale Fahrt</option>
                        <option>Essenslieferung</option>
                        <option>EMS</option>
                        <option>Gebrauchtwagenhändler</option>
                        <option>Bambi-Tour</option>
                    </select>
                </div>

                <div class="field" id="companyField" style="display:none;">
                    <label>Unternehmen</label>
                    <select id="job_company_name" onchange="setPickupFromCompany()"></select>
                </div>

                <div class="field" id="emsField" style="display:none;">
                    <label>EMS-Mitarbeiter</label>
                    <input type="text" id="job_ems_staff_name" placeholder="Name eintragen">
                </div>

                <div class="field">
                    <label>Abholort</label>
                    <input type="text" id="job_pickup_location">
                </div>

                <div class="field">
                    <label>Ziel</label>
                    <input type="text" id="job_destination">
                </div>

                <div class="field">
                    <label>Kunde / Spieler</label>
                    <input type="text" id="job_customer_name">
                </div>

                <div class="field">
                    <label>Bemerkung</label>
                    <input type="text" id="job_notes">
                </div>

            </div>

            <button onclick="createJob()">Auftrag erstellen</button>
        </div>

        <div class="card">
            <h2>🟢 Offene Aufträge</h2>
            <div id="open_jobs_list"></div>
        </div>

        <div class="card">
            <h2>🚕 Meine übernommenen Aufträge</h2>
            <div id="my_jobs_list"></div>
        </div>

        <div class="card">
            <h2>✅ Erledigte Fahrten</h2>
            <div id="done_jobs_list"></div>
        </div>

        <div class="card" id="adminPanel" style="display:none;">
            <h2>Adminbereich</h2>

            <h3>Benutzer erstellen</h3>

            <div class="form-grid">

                <div class="field">
                    <label>Benutzername</label>
                    <input type="text" id="new_username">
                </div>

                <div class="field">
                    <label>Anzeigename</label>
                    <input type="text" id="new_display_name">
                </div>

                <div class="field">
                    <label>Passwort</label>
                    <input type="text" id="new_password">
                </div>

                <div class="field">
                    <label>Rolle</label>
                    <select id="new_role">
                        <option value="fahrer">Fahrer</option>
                        <option value="leitstelle">Leitstelle</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>

            </div>

            <button onclick="createUser()">Benutzer erstellen</button>

            <h3>Liefer-Unternehmen hinzufügen</h3>

            <div class="form-grid">
                <div class="field">
                    <label>Unternehmen</label>
                    <input type="text" id="new_company_name">
                </div>
            </div>

            <button onclick="createCompany()">Unternehmen hinzufügen</button>

            <br><br>

            <div id="users_list"></div>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
