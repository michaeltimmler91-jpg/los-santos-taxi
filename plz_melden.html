<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PLZ Fehler melden</title>

    <link rel="stylesheet" href="style.css?v=20">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="container">

    <div class="modern-header">
        <div class="header-left">

            <div class="logo-icon">
                🗺️
            </div>

            <div>
                <div class="main-title">
                    PLZ Fehler melden
                </div>

                <div class="sub-title">
                    Los Santos Kartenservice
                </div>
            </div>

        </div>
    </div>

    <div
        class="card"
        style="
            max-width:850px;
            margin:auto;
        "
    >

        <h2>
            📍 Kartenfehler melden
        </h2>

        <div class="admin-card" style="margin-bottom:20px;">

            <strong>
                🗺️ Kartenfehler gefunden?
            </strong>
            <br>

            Falls eine PLZ im Meer schwimmt,
            mitten im Berg steckt oder komplett
            verschwunden ist:
            Hier kannst du es melden 👀

        </div>

        <div class="form-grid">

            <div class="field">
                <label>
                    PLZ
                </label>

                <input
                    type="text"
                    id="report_plz"
                    placeholder="z.B. 1037"
                >
            </div>

            <div class="field">
                <label>
                    Problem
                </label>

                <select id="report_type">

                    <option value="fehlt">
                        PLZ fehlt
                    </option>

                    <option value="falsch">
                        PLZ sitzt falsch
                    </option>

                    <option value="doppelt">
                        Doppelte PLZ
                    </option>

                    <option value="sonstiges">
                        Sonstiges
                    </option>

                </select>
            </div>

            <div class="field" style="grid-column:1/-1;">
                <label>
                    Beschreibung
                </label>

                <textarea
                    id="report_text"
                    placeholder="Was stimmt nicht?"
                    rows="5"
                ></textarea>
            </div>

            <div class="field">
                <label>
                    Dein Name (optional)
                </label>

                <input
                    type="text"
                    id="report_name"
                    placeholder="z.B. Lennox"
                >
            </div>

        </div>

        <button onclick="sendPlzReport()">
            📍 Fehler melden
        </button>

        <div
            id="report_result"
            style="margin-top:20px;"
        ></div>

    </div>

</div>
<script src="config.js?v=1"></script>
<script src="plz_melden.js?v=1"></script>
</body>
</html>
