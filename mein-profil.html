<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein Fahrerprofil</title>

    <link rel="stylesheet" href="style.css?v=30">
    <link rel="stylesheet" href="css/profile.css?v=1">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
</head>

<body>

<div class="container">

    <div class="modern-header">
        <div class="header-left">
            <div class="logo-icon">👤</div>

            <div>
                <div class="main-title">Mein Profil</div>
                <div class="sub-title">Los Santos Taxi</div>
            </div>
        </div>

        <div class="header-right">
            <a href="index.html">
                <button class="small-btn secondary-btn">← zurück </button>
            </a>
        </div>
    </div>

    <div id="profile_login_box" class="card" style="max-width:650px;margin:auto;">
        <h2>🔐 Fahrer Login</h2>

        <div class="form-grid">
            <div class="field">
                <label>Benutzername</label>
                <input type="text" id="profile_login_username">
            </div>

            <div class="field">
                <label>Passwort</label>
                <input type="password" id="profile_login_password">
            </div>
        </div>

        <button onclick="profileLogin()">Login</button>
    </div>

    <div id="profile_edit_box" class="profile-layout" style="display:none;">

        <div class="profile-card-main">

            <h2>👤 Profil bearbeiten</h2>

            <div class="field">
                <label>Profilbild URL</label>
                <input type="file" id="profile_image_upload" accept="image/*">
            </div>

            <div class="field">
                <label>Profiltext</label>

                <div id="profile_bio_editor" class="profile-editor"></div>
            </div>

            <button onclick="saveMyProfile()">
                Profil speichern
            </button>

<div class="profile-card-main">

    <h2>🌴 Urlaub</h2>

    <div class="form-grid">

        <div class="field">
            <label>Von</label>
            <input type="date" id="vacation_start">
        </div>

        <div class="field">
            <label>Bis</label>
            <input type="date" id="vacation_end">
        </div>

    </div>

    <div class="field">
        <label>Grund (optional)</label>
        <input type="text" id="vacation_reason">
    </div>

    <button onclick="saveVacation()">
        🌴 Urlaub eintragen
    </button>

    <div id="myVacationList"></div>

</div>
      <div class="profile-card-main">

    <h2>🌴 Urlaub</h2>

    <div class="form-grid">

        <div class="field">
            <label>Von</label>
            <input type="date" id="vacation_start">
        </div>

        <div class="field">
            <label>Bis</label>
            <input type="date" id="vacation_end">
        </div>

    </div>

    <div class="field">
        <label>Grund (optional)</label>
        <input type="text" id="vacation_reason">
    </div>

    <button onclick="saveVacation()">
        🌴 Urlaub eintragen
    </button>

    <div id="myVacationList"></div>

</div>      
            <div id="profile_save_result" style="margin-top:16px;"></div>

        </div>

        <div class="profile-card-side">

            <h2>Vorschau</h2>

            <div class="profile-avatar-wrap" style="margin-bottom:16px;">
                <img
                    id="profile_preview_img"
                    class="profile-avatar"
                    style="display:none;"
                    alt="Profilbild"
                >

                <div id="profile_preview_placeholder" class="profile-avatar-placeholder">
                    🚕
                </div>
            </div>

            <h2 id="profile_preview_name">-</h2>

            <div class="profile-meta">
                Dein öffentliches Profil wird später hier angezeigt:
            </div>

            <div
                id="profile_preview_bio"
                class="profile-preview-bio"
            >
                Noch keine Beschreibung vorhanden.
            </div>

            <a id="profile_public_link" href="#" target="_blank">
                <button class="small-btn">Öffentliches Profil öffnen</button>
            </a>

        </div>

    </div>

</div>

<script src="config.js?v=2"></script>
<script src="utils.js?v=2"></script>
<script src="mein-profil.js?v=1"></script>

</body>
</html>
