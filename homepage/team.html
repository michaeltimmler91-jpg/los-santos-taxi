<!DOCTYPE html>
<html lang="de">

  />

  </title>

  <link

    href="style.css?v=2"
  />

</head>
<body>

  <header class="page-hero small-hero">

<nav class="navbar">

  <a
    href="index.html"
    class="brand"
  >

    <div class="brand-icon">
      LS
    </div>

    <div>

      <strong>
        Los Santos Taxi
      </strong>

      <span>
        Premium Fahrservice
      </span>

    </div>

  </a>

  <div class="nav-links">

    <a href="index.html">
      Start
    </a>

    <a href="fahrt.html">
      Fahrt anfragen
    </a>

    <a href="bewertungen.html">
      Bewertungen
    </a>

    <a href="team.html">
      Team
    </a>

  </div>

</nav>

    <section class="page-title">

      <span class="eyebrow">
        Unser Team
      </span>

      <h1>
        Die Fahrer von Los Santos Taxi
      </h1>

    </section>

  </header>

  <main>

    <section class="section">

      <div
        id="teamGrid"
        class="team-grid"
      ></div>

    </section>

  </main>

  <footer class="footer">

    <strong>
      Los Santos Taxi
    </strong>

  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script src="team.js?v=2"></script>
<div
  id="driverModal"
  class="driver-modal"
>
  <div
    class="driver-modal-backdrop"
    onclick="closeDriverModal()"
  ></div>

  <div class="driver-modal-box">

    <button
      class="driver-modal-close"
      onclick="closeDriverModal()"
    >
      ×
    </button>

    <div class="driver-modal-header">

      <div class="driver-modal-avatar">
        <img
          id="modalDriverImage"
          src=""
          alt=""
        >
        <span id="modalDriverPlaceholder">
          LS
        </span>
      </div>

      <div>
        <span class="eyebrow">
          Fahrerprofil
        </span>

        <h2 id="modalDriverName">
          Fahrer
        </h2>

        <div
          id="modalDriverStatus"
          class="driver-pill offline"
        >
          Nicht verf&uuml;gbar
        </div>
      </div>

    </div>

    <div
      id="modalDriverVacation"
      class="driver-vacation-box"
      style="display:none;"
    ></div>

    <div
      id="modalDriverBio"
      class="driver-modal-bio"
    >
      Noch keine Beschreibung vorhanden.
    </div>

  </div>
</div>
  
</body>
</html>
