<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLZ Meldungen Admin</title>

    <link rel="stylesheet" href="style.css?v=20">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="container">

    <div class="modern-header">
        <div class="header-left">
            <div class="logo-icon">🗺️</div>

            <div>
                <div class="main-title">PLZ Admin</div>
                <div class="sub-title">Kartenfehler • Meldungen • Bearbeitung</div>
            </div>
        </div>
    </div>

    <div class="section-card">

        <div class="section-header">
            <h2>📍 Gemeldete PLZ-Fehler</h2>

            <button class="small-btn" onclick="loadPlzReports()">
                🔄 Aktualisieren
            </button>
        </div>

        <div class="form-grid" style="margin-bottom:20px;">
            <div class="field">
                <label>Nach PLZ suchen</label>
                <input
                    type="text"
                    id="plz_admin_search"
                    placeholder="z.B. 1037"
                    oninput="renderPlzReports()"
                >
            </div>

            <div class="field">
                <label>Status filtern</label>
                <select id="plz_admin_status_filter" onchange="renderPlzReports()">
                    <option value="alle">Alle</option>
                    <option value="offen">Offen</option>
                    <option value="bearbeitung">In Bearbeitung</option>
                    <option value="erledigt">Erledigt</option>
                </select>
            </div>
        </div>

        <div id="plz_reports_list">
            Lädt...
        </div>

    </div>

</div>

<script src="config.js?v=1"></script>
<script src="plz_admin.js?v=1"></script>

</body>
</html>
